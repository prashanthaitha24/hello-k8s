apiVersion: v1
kind: Service
metadata:
  name: hello
  namespace: demo-dev
  labels: { app: hello }
spec:
  selector: { app: hello }
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: hello
  namespace: demo-staging
  labels: { app: hello }
spec:
  selector: { app: hello }
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: hello
  namespace: demo-prod
  labels: { app: hello }
spec:
  selector: { app: hello }
  ports:
    - name: http
      port: 80
      targetPort: 8080
