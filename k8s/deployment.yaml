apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello
  namespace: demo-dev
spec:
  replicas: 1
  selector:
    matchLabels: { app: hello }
  template:
    metadata:
      labels: { app: hello }
    spec:
      containers:
        - name: hello
          image: ghcr.io/<your-username>/hello-k8s:latest   # CI will set image to sha-tag
          imagePullPolicy: IfNotPresent
          ports: [ { containerPort: 8080 } ]
          env:
            - name: PORT
              value: "8080"
            - name: DATABASE_PATH
              valueFrom:
                configMapKeyRef:
                  name: hello-config
                  key: DATABASE_PATH
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hello-data
