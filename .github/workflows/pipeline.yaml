name: build-and-deploy

on:
  push:
    branches: [ develop, main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ develop, main ]

permissions:
  contents: read
  packages: write
  id-token: write 

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Decide image tag
        id: meta
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "image_tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT     # vX.Y.Z
          else
            echo "image_tag=sha-${GITHUB_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Build
        run: |
          docker build -t $IMAGE:${{ steps.meta.outputs.image_tag }} .
          docker tag  $IMAGE:${{ steps.meta.outputs.image_tag }} $IMAGE:latest

      - name: Login GHCR
        run: echo "${{ github.token }}" | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin

      - name: Push
        run: |
          docker push $IMAGE:${{ steps.meta.outputs.image_tag }}
          docker push $IMAGE:latest

  deploy-dev:
    needs: [build]
    if: |
      (github.event_name == 'pull_request' && github.base_ref == 'develop') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Kubeconfig (provided via secret or runner)
        run: |
          mkdir -p ~/.kube
          echo "${KUBECONFIG_DEV}" > ~/.kube/config
        env:
          KUBECONFIG_DEV: ${{ secrets.KUBECONFIG_DEV }}
      - name: Deploy to demo-dev
        run: |
          kubectl -n demo-dev set image deploy/hello hello=$IMAGE:${{ needs.build.outputs.image_tag }}
          kubectl -n demo-dev rollout status deploy/hello --timeout=3m
        env:
          IMAGE: ghcr.io/${{ github.repository }}

  deploy-staging:
    needs: [build]
    if: |
      github.event_name == 'pull_request' && startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${KUBECONFIG_STAGING}" > ~/.kube/config
        env:
          KUBECONFIG_STAGING: ${{ secrets.KUBECONFIG_STAGING }}
      - name: Deploy to demo-staging
        run: |
          kubectl -n demo-staging set image deploy/hello hello=$IMAGE:${{ needs.build.outputs.image_tag }}
          kubectl -n demo-staging rollout status deploy/hello --timeout=5m
        env:
          IMAGE: ghcr.io/${{ github.repository }}

  deploy-prod:
    needs: [build]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    environment: prod   # requires approval before steps run
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${KUBECONFIG_PROD}" > ~/.kube/config
        env:
          KUBECONFIG_PROD: ${{ secrets.KUBECONFIG_PROD }}
      - name: Deploy to demo-prod
        run: |
          kubectl -n demo-prod set image deploy/hello hello=$IMAGE:${{ needs.build.outputs.image_tag }}
          kubectl -n demo-prod rollout status deploy/hello --timeout=5m
        env:
          IMAGE: ghcr.io/${{ github.repository }}
